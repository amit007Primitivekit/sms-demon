name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 + built-in Gradle cache ────────────────────────────────
      # setup-java handles ~/.gradle/caches and ~/.gradle/wrapper caching
      # automatically when cache: gradle is set — no separate cache step needed.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Grant execute permission for gradlew ───────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 4. Run unit tests ─────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      # ── 5. Run lint ────────────────────────────────────────────────────────
      - name: Run lint
        run: ./gradlew lintDebug

      # ── 6. Build debug APK ────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug

      # ── 7. Upload APK artifact ────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sms-demon-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # ── 8. Upload lint report ─────────────────────────────────────────────
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      # ── 9. Upload test report ─────────────────────────────────────────────
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.sha }}
          path: app/build/reports/tests/
          retention-days: 7
